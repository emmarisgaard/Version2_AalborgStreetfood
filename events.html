<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Aalborg Streetfood byder på et bredt udvalg af street food fra hele verden og en masse forskellige og spændende aktiviteter og events. Besøg os og oplev stemningen, de lækkre madboder og hyggelige omgivelser i Aalborg.">
    <meta name="keywords"
        content="streetfood Aalborg, street food, madboder, mad Aalborg, spise ude Aalborg, Nordjylland, oplevelser, events Aalborg, aktiviteter Aalborg, Aalborg, comedy Aalborg, quiz Aalborg, karaoke Aalborg, børneaktiviteter Aalborg">
    <title>Aalborg Streetfood - Events</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/events.css">
    <script src="./assets/js/app.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="./assets/js/events.js"></script>
    <link rel="icon" href="./assets/img/logov2_192x192.png" type="image/png">
</head>

<body>
    <header>
        <nav>
            <a href="./index.html"><img src="./assets/img/logo.svg" alt="Aalborg Streetfood Logo"></a>
            <ul>
                <li><a href="https://www.facebook.com/aalborgstreetfoodmarkedmarket" target="_blank"
                        rel="noopener noreferrer" aria-label="Besøg vores Facebook side"><i
                            class="fa-brands fa-square-facebook" aria-hidden="true"></i></a></li>
                <li><a href="https://www.instagram.com/AalborgStreetfood" target="_blank" rel="noopener noreferrer"
                        aria-label="Besøg vores Instagram profil"><i class="fa-brands fa-instagram"
                            aria-hidden="true"></i></a></li>
            </ul>
        </nav>
    </header>


    <main>
        <div class="heroBillede">
            <img src="./assets/img/eventsBillede.webp" alt="events header billede" fetchpriority="high">
        </div>
        <div class=" overlaySection" id="top">
            <article class="introSection">
                <h1>EVENTS</h1>
                <p>Få overblik over de kommende events hos Aalborg Streetfood – fra quiz og live musik til smagninger
                    og
                    særlige temaaftener. </p>

                <div class="eventCalendar">
                    <div class="dates">
                        <i class="fa-solid fa-chevron-left"></i>
                        <h2>01/06 - 14/06</h2>
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>


                    <div class="eventFilter">
                        <div class="filterKnap" onclick="toggleFilter()">
                            <p>Kategori</p>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="filterDropdown" style="display: none;">
                            <div class="filterListe"></div>
                            <!-- Bruger js til at indlæse alle kategorierne fra wordpress, så filteret er dynamisk og
                            opdateres automatisk når der kommer nye kategorier eller events til. Se events.js -->
                        </div>
                    </div>
                </div>

                <div class="events">
                    <div class="eventsCards">
                        <!-- Her indsættes events cards med js. Se events.js -->
                    </div>
                </div>
            </article>

            <div class="topKnap">
                <a href="#top"> Gå til toppen <i class="fa-solid fa-arrow-up"></i></a>
            </div>
        </div>



    </main>

    <footer>

        <div class="openingHours">
            Indsættes med js.
        </div>

        <nav class="globalNav">
            <div>
                <a href="./boder.html" aria-label="Gå til boder"><i class="fa-solid fa-utensils"
                        aria-hidden="true"></i></a>
                <p>Boder</p>
            </div>
            <div class="active">
                <a href="./events.html" aria-label="Gå til events"><i class="fa-solid fa-calendar-days"
                        aria-hidden="true"></i></a>
                <p>Events</p>
            </div>
            <div>
                <a href="./aktiviteter.html" aria-label="Gå til aktiviteter"><i class="fa-solid fa-dice"
                        aria-hidden="true"></i></a>
                <p>Aktiviteter</p>
            </div>
            <div>
                <a href="./kort.html" aria-label="Gå til kort"><i class="fa-solid fa-map-marker-alt"
                        aria-hidden="true"></i></a>
                <p>Kort</p>
            </div>
            <div>
                <a href="./faq.html" aria-label="Gå til info"><i class="fa-solid fa-question-circle"
                        aria-hidden="true"></i></a>
                <p>Info</p>
            </div>
        </nav>

    </footer>
</body>

</html>
