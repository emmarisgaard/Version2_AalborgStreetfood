<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Aalborg Streetfood byder på et bredt udvalg af street food fra hele verden og en masse forskellige og spændende aktiviteter og events. Besøg os og oplev stemningen, de lækkre madboder og hyggelige omgivelser i Aalborg.">
    <meta name="keywords"
        content="streetfood Aalborg, street food, madboder, mad Aalborg, spise ude Aalborg, Nordjylland, oplevelser, events Aalborg, aktiviteter Aalborg, Aalborg, comedy Aalborg, quiz Aalborg, karaoke Aalborg, børneaktiviteter Aalborg">
    <title>Aalborg Streetfood - Kontakt</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/kontakt.css">
    <script src="./assets/js/app.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <nav>
            <a href="./index.html"><img src="./assets/img/logo.svg" alt="Aalborg Streetfood Logo"></a>
            <ul>
                <li><a href="https://www.facebook.com/aalborgstreetfoodmarkedmarket" target="_blank"
                        rel="noopener noreferrer" aria-label="Besøg vores Facebook side"><i
                            class="fa-brands fa-square-facebook" aria-hidden="true"></i></a></li>
                <li><a href="https://www.instagram.com/AalborgStreetfood" target="_blank" rel="noopener noreferrer"
                        aria-label="Besøg vores Instagram profil"><i class="fa-brands fa-instagram"
                            aria-hidden="true"></i></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="heroBillede">
            <img src="./assets/img/kontaktBillede.webp" alt="forside headerbillede" fetchpriority="high">
        </div>
        <div class=" overlaySection">
            <div>
                <h1>Kontakt os her</h1>
                <h2>Selvom vi er fremragende til telepati, er der nemmere måder at kontakte os på.</h2>
            </div>
            <hr>
            <div>
                <h2>Administrative timer</h2>
                <div>
                    <p>Mandag til fredag: 10:00 - 16:00</p>
                    <p>Lørdag til søndag: Lukket</p>
                </div>
            </div>
            <hr>
            <div class="kontaktInfo">

                <!-- Telefon link der åbner som opkald-->
                <a href="tel:+4560189896">
                    <i class="fa-solid fa-phone"></i>
                    <span>+45 60 18 98 96</span>
                </a>

                <!-- Mail link der åbner mail til streetfood -->
                <a href="mailto:info@aalborg-streetfood.dk">
                    <i class="fa-solid fa-envelope"></i>
                    <span>info@aalborg-streetfood.dk</span>
                </a>

                <!-- Adresse der åbner google maps med navigation til streetfood adresse -->
                <!--Metode fundet her: https://developers.google.com/maps/documentation/urls/get-started#directions-action -->
                <a href="https://www.google.com/maps/dir/?api=1&destination=Skudehavnsvej+35-37,+9000+Aalborg"
                    target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-map-marker-alt"></i>
                    <span>Skudehavnsvej 35-37, 9000 Aalborg</span>
                </a>
            </div>
            <!-- Embeded google maps kort, fundet på https://www.google.com/maps/place/Aalborg+Streetfood+K%C3%B8kkenfabrikken/@57.057273,9.8940695,17z/data=!3m1!4b1!4m6!3m5!1s0x464932659af07bf7:0x2f2ec50f7fd02b3a!8m2!3d57.057273!4d9.8966444!16s%2Fg%2F11d_77ts4n?entry=ttu&g_ep=EgoyMDI2MDYwMy4xIKXMDSoASAFQAw%3D%3D -->
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2169.6649034900897!2d9.89406947656765!3d57.05727297359485!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x464932659af07bf7%3A0x2f2ec50f7fd02b3a!2sAalborg%20Streetfood%20K%C3%B8kkenfabrikken!5e0!3m2!1sda!2sdk!4v1780651888167!5m2!1sda!2sdk"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>

        </div>


    </main>
    <footer>

        <div class="openingHours">
            <!-- Indsættes med js. -->
        </div>

        <nav class="globalNav">
            <div>
                <a href="./boder.html" aria-label="Gå til boder"><i class="fa-solid fa-utensils"
                        aria-hidden="true"></i></a>
                <p>Boder</p>
            </div>
            <div>
                <a href="./events.html" aria-label="Gå til events"><i class="fa-solid fa-calendar-days"
                        aria-hidden="true"></i></a>
                <p>Events</p>
            </div>
            <div>
                <a href="./aktiviteter.html" aria-label="Gå til aktiviteter"><i class="fa-solid fa-dice"
                        aria-hidden="true"></i></a>
                <p>Aktiviteter</p>
            </div>
            <div>
                <a href="./kort.html" aria-label="Gå til kort"><i class="fa-solid fa-map-marker-alt"
                        aria-hidden="true"></i></a>
                <p>Kort</p>
            </div>
            <div>
                <a href="./faq.html" aria-label="Gå til info"><i class="fa-solid fa-question-circle"
                        aria-hidden="true"></i></a>
                <p>Info</p>
            </div>
        </nav>

    </footer>
</body>

</html>
